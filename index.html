<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Cá Nhân - Lê Vũ Trà Mi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #fff0f5, #ffe4e1, #fdf2e9); 
            color: #6d4c41; 
            min-height: 100vh;
        }
        header { 
            background: linear-gradient(to right, #f48fb1, #f06292); 
            color: white; padding: 65px 20px; 
            text-align: center; 
            box-shadow: 0 8px 25px rgba(244,143,177,0.3);
        }
        nav { 
            background: rgba(244,143,177,0.5); 
            overflow: hidden; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px);
        }
        nav a { 
            float: left; color: white; 
            text-align: center; padding: 18px 28px; 
            text-decoration: none; font-weight: 600; 
            transition: all 0.5s ease;
        }
        nav a:hover { background: rgba(255,255,255,0.4); transform: scale(1.08); box-shadow: 0 5px 15px rgba(255,255,255,0.5); }
        section { 
            padding: 85px 20px; text-align: center; 
            animation: fadeGlow 2s ease-in-out;
        }
        @keyframes fadeGlow { from { opacity: 0.6; filter: brightness(0.8); } to { opacity: 1; filter: brightness(1); } }
        .card { 
            background: rgba(255,255,255,0.95); 
            border-radius: 24px; padding: 50px; 
            max-width: 950px; margin: 0 auto; 
            box-shadow: 0 12px 35px rgba(244,143,177,0.25); 
            border: 1px solid #ffebee; transition: all 0.5s;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 55px rgba(244,143,177,0.4); }
        img { 
            max-width: 100%; border-radius: 18px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.15); 
            transition: transform 0.6s ease;
        }
        img:hover { transform: scale(1.07); }
        footer { 
            background: rgba(244,143,177,0.7); 
            color: white; text-align: center; 
            padding: 25px; margin-top: 70px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Chào mừng đến Trang Cá Nhân của Lê Vũ Trà Mi! 🌸☕</h1>
    </header>
    <nav>
        <a href="index.html">Trang chủ</a>
        <a href="about.html">Giới thiệu</a>
        <a href="admissions.html">Tuyển sinh đại học</a>
    </nav>
    <section>
        <div class="card">
            <h2>Xin chào mọi người! 💕</h2>
            <p>Mình là Trà Mi đây nè! Góc nhỏ này là nơi mình chia sẻ chút xinh xắn về bản thân và thông tin thi cử đại học. Cùng chill nhé!</p>
            <img src="https://home.voca.vn/assets/img/upload/images/gioi-thieu-ve-truong-hoc-bang-tieng-anh.jpg">
        </div>
    </section>
    <footer>
        <p>© 2026 Lê Vũ Trà Mi - Soft pink & cozy vibes! 🌷</p>
    </footer>
</body>
</html>
